<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script>
    window.__DMULLER_API_BASE__ = window.__DMULLER_API_BASE__
      || (["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
        ? "http://127.0.0.1:8000"
        : "https://dmuller-feedback-platform-5.onrender.com");
  </script>
  <title>Criar Funcionário • D’MULLER</title>
  <link rel="stylesheet" href="/css/app.css">

  <style>
    .ce-page{max-width:980px;margin:0 auto}
    .ce-stack{display:flex;flex-direction:column;gap:12px}

    .ce-header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;
      padding:14px;border:1px solid var(--dm-border);border-radius:var(--dm-r-xl);
      background:linear-gradient(180deg,#fff,#fbfcff);box-shadow:var(--dm-shadow)
    }
    .ce-title{margin:0;font-size:18px;font-weight:950;color:var(--dm-text);line-height:1.2}
    .ce-sub{margin-top:6px;color:var(--dm-muted);font-size:13px;font-weight:800;max-width:760px}

    .ce-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .ce-btn{
      padding:10px 12px;border-radius:var(--dm-r-md);
      border:1px solid rgba(16,24,40,.14);
      background:#fff;font-weight:950;cursor:pointer;
      text-decoration:none;color:var(--dm-text);
      transition:transform .08s ease, filter .12s ease, background .12s ease;
      user-select:none;display:inline-flex;align-items:center;gap:8px;
    }
    .ce-btn:hover{background:#f9fafb}
    .ce-btn:active{transform:translateY(1px)}
    .ce-btn-dark{
      background:linear-gradient(180deg,#111827,#0b1220);
      border-color:#0b1220;color:#fff
    }
    .ce-btn-dark:hover{filter:brightness(1.06)}
    .ce-btn-cta{
      background:linear-gradient(180deg,rgba(245,197,24,.98),rgba(245,197,24,.88));
      border-color:rgba(245,197,24,.55);color:#111827
    }

    .ce-panel{
      border:1px solid var(--dm-border);border-radius:var(--dm-r-xl);
      background:#fff;box-shadow:var(--dm-shadow);overflow:hidden
    }
    .ce-panelBody{padding:14px}

    .ce-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media(max-width:900px){.ce-grid{grid-template-columns:1fr}}

    .ce-field{display:flex;flex-direction:column;gap:8px}
    .ce-label{font-size:11px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--dm-muted)}
    .ce-input, .ce-select{
      width:100%;
      padding:11px 12px;border-radius:12px;
      border:1px solid rgba(16,24,40,.14);
      font-weight:900;outline:none;background:#fff;
    }
    .ce-input:focus, .ce-select:focus{
      border-color: rgba(245,197,24,.55);
      box-shadow: 0 0 0 4px rgba(245,197,24,.22);
    }
    .ce-help{font-size:12px;color:var(--dm-muted);font-weight:800;line-height:1.35}

    .ce-footer{
      padding:14px;border-top:1px solid rgba(16,24,40,.08);
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between
    }
    .ce-msg{font-size:12px;font-weight:950;color:var(--dm-muted)}
    .ce-banner{
      padding:10px 12px;border-radius:12px;border:1px solid rgba(16,24,40,.12);
      background:#fff;font-weight:950;color:var(--dm-muted)
    }
    .ce-banner.bad{border-color:#fecaca;background:#fff1f2;color:#9f1239}
    .ce-banner.ok{border-color:#a7f3d0;background:#ecfdf5;color:#064e3b}

    .ce-hint{
      border:1px dashed rgba(16,24,40,.25);
      border-radius: var(--dm-r-xl);
      padding:14px;
      background: rgba(255,255,255,.80);
      box-shadow: 0 10px 22px rgba(2,8,23,.06);
      max-width: 820px;
    }
    .ce-hintTitle{font-weight:950;color:var(--dm-text)}
    .ce-hintText{margin-top:6px;color:var(--dm-muted);font-weight:800;font-size:13px;line-height:1.35}
  </style>
</head>

<body>
<script type="module">
  import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { createUserWithEmailAndPassword, getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { doc, getDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { apiPost, logBackendSuccess, logFirestoreFallback, shouldUseFirestoreFallback } from "/js/api-client.js";

  import { db, firebaseConfig } from "/js/firebase.js";
  import { requireRole } from "/js/auth-guard.js";
  import { renderShell } from "/js/ui-shell.js";
  import { getActiveManagerUid } from "/js/state.js";

  const PANIC = () => {
    document.body.innerHTML = `<div style="font-family:Inter,Arial;padding:16px"><div style="font-weight:950;font-size:18px;color:#0f172a">Não foi possível abrir esta página agora.</div></div>`;
  };

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));

  try {
    const { user, role } = await requireRole(["manager", "admin"]);
    const content = await renderShell({ role, currentPage: "manager-create-employee" });

    const isAdmin = role === "admin";
    const gestorId = isAdmin ? getActiveManagerUid() : user.uid;

    if (isAdmin && !gestorId) {
      content.innerHTML = `
        <div class="ce-page">
          <div class="ce-stack">
            <div class="ce-hint">
              <div class="ce-hintTitle">Selecione um gestor</div>
              <div class="ce-hintText">Escolha um gestor no topo para concluir o cadastro.</div>
            </div>
          </div>
        </div>
      `;
      throw new Error('__MANAGER_NOT_SELECTED__');
    }

    async function getManagerRole(uid){
      const s = await getDoc(doc(db, "roles", uid));
      return s.exists() ? s.data() : null;
    }

    const targetManager = await getManagerRole(gestorId);
    const targetManagerEmail = targetManager?.email || (isAdmin ? "" : user.email) || "";
    const targetManagerNome = targetManager?.nome || "Sem nome";
    const targetCoordinatorUid = targetManager?.coordinatorUid || "";

    content.innerHTML = `
      <div class="ce-page">
        <div class="ce-stack">

          <div class="ce-header">
            <div>
              <h1 class="ce-title">Criar Funcionário</h1>
              <div class="ce-sub">
                ${isAdmin
                  ? `Você está criando para o gestor: <b>${esc(targetManagerNome)}</b> • ${esc(targetManagerEmail)}`
                  : `Gestor: <b>${esc(targetManagerNome)}</b> • ${esc(targetManagerEmail)}`
                }
              </div>
            </div>

            <div class="ce-actions">
              <a class="ce-btn" href="/manager-employees.html">Ver lista</a>
              <button class="ce-btn ce-btn-dark" id="btnCancelTop">Cancelar</button>
            </div>
          </div>

          <div class="ce-panel">
            <div class="ce-panelBody">
              <div class="ce-grid">
                <div class="ce-field">
                  <div class="ce-label">Nome</div>
                  <input class="ce-input" id="nome" placeholder="Ex: Maria da Silva" />
                </div>

                <div class="ce-field">
                  <div class="ce-label">Email</div>
                  <input class="ce-input" id="email" placeholder="maria@dmuller.com.br" />
                </div>

                <div class="ce-field">
                  <div class="ce-label">Senha provisória</div>
                  <input class="ce-input" id="senha" type="password" placeholder="Defina uma senha inicial" />
                  <div class="ce-help">Use uma senha provisória para o primeiro acesso.</div>
                </div>

                <div class="ce-field">
                  <div class="ce-label">Cargo</div>
                  <input class="ce-input" id="cargo" placeholder="Ex: Conferente / Motorista / RH..." />
                </div>

                <div class="ce-field">
                  <div class="ce-label">Data de admissão</div>
                  <input class="ce-input" id="admissao" type="date" />
                </div>

                <div class="ce-field">
                  <div class="ce-label">Data de nascimento</div>
                  <input class="ce-input" id="nascimento" type="date" />
                </div>

                <div class="ce-field">
                  <div class="ce-label">Status</div>
                  <select class="ce-select" id="ativo">
                    <option value="true" selected>Ativo</option>
                    <option value="false">Inativo</option>
                  </select>
                </div>

                <div class="ce-field">
                  <div class="ce-label">Observações</div>
                  <input class="ce-input" id="obs" placeholder="Ex: Turno, setor, etc..." />
                </div>
              </div>
            </div>

            <div class="ce-footer">
              <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                <button class="ce-btn ce-btn-cta" id="btnCreate">Criar</button>
                <button class="ce-btn" id="btnCancel">Cancelar</button>
              </div>

              <div id="msg"></div>
            </div>
          </div>

        </div>
      </div>
    `;

    const elNome = document.getElementById("nome");
    const elEmail = document.getElementById("email");
    const elSenha = document.getElementById("senha");
    const elCargo = document.getElementById("cargo");
    const elAdmissao = document.getElementById("admissao");
    const elNascimento = document.getElementById("nascimento");
    const elAtivo = document.getElementById("ativo");
    const elObs = document.getElementById("obs");

    const btnCreate = document.getElementById("btnCreate");
    const btnCancel = document.getElementById("btnCancel");
    const btnCancelTop = document.getElementById("btnCancelTop");
    const msg = document.getElementById("msg");

    const setMsg = (t, type="") => {
      if (!t) { msg.innerHTML = ""; return; }
      const cls = type === "bad" ? "ce-banner bad" : type === "ok" ? "ce-banner ok" : "ce-banner";
      msg.innerHTML = `<div class="${cls}">${esc(t)}</div>`;
    };

    const goBack = () => window.location.href = "/manager-employees.html";
    btnCancel.addEventListener("click", goBack);
    btnCancelTop.addEventListener("click", goBack);

    async function createEmployee(){
      const nome = (elNome.value || "").trim();
      const email = (elEmail.value || "").trim().toLowerCase();
      const senha = (elSenha.value || "").trim();
      const cargo = (elCargo.value || "").trim();
      const admissao = (elAdmissao.value || "").trim();
      const nascimento = (elNascimento.value || "").trim();
      const ativo = (elAtivo.value === "true");
      const obs = (elObs.value || "").trim();

      if (!nome || !email || !senha) {
        setMsg("Preencha Nome, Email e Senha provisória.", "bad");
        return;
      }

      btnCreate.disabled = true;
      setMsg("Criando funcionário...");

      // App separado pra não mexer no auth do gestor/admin
      const tempName = "tempCreateUserApp_" + Date.now();
      const tempApp = initializeApp(firebaseConfig, tempName);
      const tempAuth = getAuth(tempApp);

      try {
        const cred = await createUserWithEmailAndPassword(tempAuth, email, senha);
        const uid = cred.user.uid;

        // 1) roles/{uid}
        await setDoc(doc(db, "roles", uid), {
          role: "employee",
          nome,
          email,
          gestorId,
          coordinatorUid: targetCoordinatorUid,
          ativo,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          criadoEm: serverTimestamp(),
          criadoPor: user.uid
        });

        // 2) employees/{uid} (✅ padrão certo)
        await setDoc(doc(db, "employees", uid), {
          uid,
          nome,
          email,
          coordinatorUid: targetCoordinatorUid,
          gestorId,
          gestorEmail: targetManagerEmail,
          cargo: cargo || "",
          admissionDate: admissao || "",
          nascimento: nascimento || "",
          role: "employee",
          ativo,
          observacoesCadastro: obs || "",
          createdAt: serverTimestamp(),
          criadoEm: serverTimestamp()
        });

        let taskCreationWarning = "";
        try {
          try {
            const result = await apiPost("/api/reviews/tasks/create-admission", { employeeUid: uid });
            logBackendSuccess("geração de tarefas de admissão/experiência", { employeeUid: uid, tasks: result?.tasks?.length || 0 });
          } catch (apiError) {
            if (!shouldUseFirestoreFallback(apiError)) throw apiError;
            logFirestoreFallback("geração de tarefas de admissão/experiência", apiError);
            throw new Error("Backend indisponível para geração de tarefas de admissão/experiência; fallback Firestore bloqueado.");
          }
        } catch (taskError) {
          console.error("[DMULLER API] geração de tarefas de admissão/experiência falhou sem fallback permitido; funcionário já foi criado.", taskError);
          taskCreationWarning = "Funcionário criado, mas as avaliações de admissão/experiência não foram geradas. Verifique o backend local.";
        }

        if (taskCreationWarning) {
          setMsg(taskCreationWarning, "bad");
          return;
        }

        setMsg("Funcionário criado com sucesso.", "ok");

        // limpa form
        elNome.value = "";
        elEmail.value = "";
        elSenha.value = "";
        elCargo.value = "";
        elAdmissao.value = "";
        elNascimento.value = "";
        elAtivo.value = "true";
        elObs.value = "";

      } catch (e) {
        
        setMsg("Não foi possível concluir o cadastro. Confira os dados e tente novamente.", "bad");
      } finally {
        try { await signOut(tempAuth); } catch {}
        try { await deleteApp(tempApp); } catch {}
        btnCreate.disabled = false;
      }
    }

    btnCreate.addEventListener("click", createEmployee);

  } catch (e) {
    if (String(e?.message || e) !== '__MANAGER_NOT_SELECTED__') PANIC(e);
  }
</script>
</body>
</html>
