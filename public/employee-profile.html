<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script>
    window.__DMULLER_API_BASE__ = window.__DMULLER_API_BASE__
      || (["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
        ? "http://127.0.0.1:8000"
        : "https://SEU-BACKEND-PRODUCAO");
  </script>
  <title>Perfil do Funcionário</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    :root{--bg:#f5f7fb;--card:#ffffff;--soft:#f8fafc;--line:#dbe3ef;--text:#0f172a;--muted:#64748b;--title:#0b1f44;--accent:#f4c400;--ok-bg:#dcfce7;--ok-text:#166534;--bad-bg:#fee2e2;--bad-text:#991b1b;--shadow:0 14px 30px rgba(15,23,42,.08)}
    body{background:radial-gradient(circle at top right, rgba(244,196,0,.10), transparent 24%),linear-gradient(180deg,#f8fbff 0%,#f2f5fa 100%)} .ep-wrap{max-width:1160px;margin:0 auto} .ep-hero{background:linear-gradient(135deg,#081226 0%,#0f254c 100%);color:#fff;border-radius:24px;padding:22px;border:1px solid rgba(255,255,255,.08);box-shadow:0 16px 34px rgba(2,8,23,.18);margin-bottom:16px}.ep-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}.ep-kicker{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#dbe7ff}.ep-kicker i{width:8px;height:8px;border-radius:999px;background:var(--accent);display:inline-block;box-shadow:0 0 0 6px rgba(244,196,0,.14)} .ep-name{margin-top:10px;font-size:30px;font-weight:900}.ep-email{margin-top:8px;font-size:14px;color:#dbe7ff;font-weight:700}.ep-pills{display:flex;gap:10px;flex-wrap:wrap}.ep-pill{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid transparent}.ep-pill.ok{background:var(--ok-bg);color:var(--ok-text);border-color:#9fdfb1}.ep-pill.bad{background:var(--bad-bg);color:var(--bad-text);border-color:#f0b8b8}.ep-pill.info{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.18)} .ep-resume{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:18px}.ep-resume-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px}.ep-resume-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:900;color:#dbe7ff}.ep-resume-value{margin-top:8px;font-size:17px;font-weight:900}.ep-card{background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)} .ep-tabs{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}.ep-tab{padding:11px 16px;border-radius:14px;border:1px solid #cbd5e1;cursor:pointer;font-weight:900;background:#fff;color:#0f172a}.ep-tab.active{background:linear-gradient(180deg,#0e2349 0%,#081226 100%);color:#fff;border-color:#0e2349}.ep-content{display:none}.ep-content.active{display:block}.ep-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.ep-field{border:1px solid var(--line);border-radius:18px;padding:14px;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%)}.ep-label{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.ep-value{margin-top:8px;font-weight:800;color:#0f172a;line-height:1.5;font-size:14px}.ep-item{border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:12px;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%)} .ep-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}.ep-item-title{font-size:16px;font-weight:900;color:var(--title)}.ep-item-sub{margin-top:5px;font-size:13px;color:var(--muted);font-weight:700}.ep-meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}.ep-mini{border:1px solid #e5edf6;border-radius:14px;background:#fff;padding:12px}.ep-mini-label{font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--muted);font-weight:900}.ep-mini-value{margin-top:7px;font-size:14px;line-height:1.5;font-weight:800;color:#0f172a}.ep-link{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid #0f172a;text-decoration:none;font-weight:900;color:#0f172a;background:#fff;margin-top:12px}.ep-empty{padding:18px;border:1px dashed #cbd5e1;border-radius:18px;background:#fff;color:#475569;font-weight:700}@media(max-width:980px){.ep-resume{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.ep-grid,.ep-meta-grid,.ep-resume{grid-template-columns:1fr}.ep-name{font-size:24px}}
  </style>
</head>
<body>
<script type="module">
  import { requireRole } from "/js/auth-guard.js";
  import { renderShell } from "/js/ui-shell.js";
  import { taskTypeLabel } from "/js/review-core.js";
  import { apiGet, logBackendSuccess } from "/js/api-client.js";

  const uid = new URL(location.href).searchParams.get('uid') || '';
  if (!uid) { document.body.innerHTML = 'Funcionário não informado.'; throw new Error('uid ausente'); }

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  function toDateBR(v){ if(!v) return '-'; if(typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)){ const [y,m,d]=v.split('-'); return `${d}/${m}/${y}`; } try{ const d=v?.toDate?v.toDate():new Date(v); return isNaN(d.getTime())?'-':d.toLocaleDateString('pt-BR'); }catch{return '-';} }
  function toDateTimeBR(v){ try{ const d=v?.toDate?v.toDate():new Date(v); return isNaN(d.getTime())?'-':d.toLocaleString('pt-BR'); }catch{return '-';} }
  function statusHtml(active){ return active === false ? `<span class="ep-pill bad">Inativo</span>` : `<span class="ep-pill ok">Ativo</span>`; }
  function ackLabel(status){ return (String(status || '').toLowerCase() === 'acknowledged' || String(status||'').toLowerCase()==='done') ? 'Confirmada' : 'Pendente'; }
  function ackClass(status){ return ackLabel(status) === 'Confirmada' ? 'ok' : 'bad'; }

  async function findEmployeeByUid(id){
    const result = await apiGet("/api/employees");
    logBackendSuccess("funcionário do perfil", { count: result?.employees?.length || 0 });
    return (result?.employees || []).find((item) => item.id === id || item.uid === id) || null;
  }

  async function loadPerformanceReviews(employeeUid, currentRole, currentUser) {
    const container = document.getElementById('employeePerformanceList');
    container.innerHTML = "<div class='ep-empty'>Carregando avaliações...</div>";
    try {
      const result = await apiGet(`/api/reviews?evaluatedUid=${encodeURIComponent(employeeUid)}`);
      logBackendSuccess("avaliações do perfil", { count: result?.reviews?.length || 0 });
      const reviews = (result?.reviews || []).sort((a,b)=>String(b.submittedAt || b.createdAt || "").localeCompare(String(a.submittedAt || a.createdAt || "")));
      if (!reviews.length) { container.innerHTML = "<div class='ep-empty'>Nenhuma avaliação encontrada.</div>"; return; }
      container.innerHTML = reviews.map((r) => {
        const status = r.acknowledgment?.status || 'pending';
        return `<div class="ep-item"><div class="ep-item-top"><div><div class="ep-item-title">${esc(taskTypeLabel(r.taskType) || 'Avaliação')}</div><div class="ep-item-sub">Referência ${esc(toDateBR(r.referenceDate))} • Enviada em ${esc(toDateTimeBR(r.submittedAt || r.createdAt))}</div></div><div><span class="ep-pill ${ackClass(status)}">${esc(ackLabel(status))}</span></div></div><div class="ep-meta-grid"><div class="ep-mini"><div class="ep-mini-label">Nota final</div><div class="ep-mini-value">${esc((Number(r.score?.average || 0)).toFixed(2))} / 5</div></div><div class="ep-mini"><div class="ep-mini-label">Resultado</div><div class="ep-mini-value">${esc(r.score?.label || '-')}</div></div></div><a class="ep-link" href="/performance-review-view.html?id=${encodeURIComponent(r.id)}">Ver avaliação</a></div>`;
      }).join('');
    } catch {
      container.innerHTML = "<div class='ep-empty'>Não foi possível carregar as avaliações.</div>";
    }
  }

  const { role, user } = await requireRole(['manager', 'admin', 'coordinator']);
  const content = await renderShell({ role, currentPage: 'manager-employees' });
  content.innerHTML = `<div class="ep-wrap"><div class="ep-hero"><div class="ep-hero-top"><div><div class="ep-kicker"><i></i> Perfil do funcionário</div><div class="ep-name" id="name">Carregando...</div><div class="ep-email" id="email"></div></div><div class="ep-pills"><span class="ep-pill info" id="cargoTop">Cargo: -</span><span id="statusTopWrap">${statusHtml(true)}</span></div></div><div class="ep-resume"><div class="ep-resume-box"><div class="ep-resume-label">Cargo</div><div class="ep-resume-value" id="resumeCargo">-</div></div><div class="ep-resume-box"><div class="ep-resume-label">Admissão</div><div class="ep-resume-value" id="resumeAdmissao">-</div></div><div class="ep-resume-box"><div class="ep-resume-label">Nascimento</div><div class="ep-resume-value" id="resumeNascimento">-</div></div><div class="ep-resume-box"><div class="ep-resume-label">Status</div><div class="ep-resume-value" id="resumeStatus">-</div></div></div></div><div class="ep-tabs"><div class="ep-tab active" data-tab="dados">Dados</div><div class="ep-tab" data-tab="avaliacoes">Avaliações</div></div><div id="dados" class="ep-content active"></div><div id="avaliacoes" class="ep-content"></div></div>`;

  document.querySelectorAll('.ep-tab').forEach(tab => tab.addEventListener('click', ()=>{
    document.querySelectorAll('.ep-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.ep-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  }));

  const emp = await findEmployeeByUid(uid);
  if (!emp) {
    document.getElementById('name').innerText = 'Funcionário não encontrado';
    document.getElementById('dados').innerHTML = `<div class="ep-card"><div class="ep-empty">Não foi possível localizar o funcionário.</div></div>`;
  } else {
    const ativoLabel = emp.ativo === false ? 'Inativo' : 'Ativo';
    document.getElementById('name').innerText = emp.nome || 'Sem nome';
    document.getElementById('email').innerText = emp.email || '-';
    document.getElementById('cargoTop').textContent = `Cargo: ${emp.cargo || '-'}`;
    document.getElementById('statusTopWrap').innerHTML = statusHtml(emp.ativo);
    document.getElementById('resumeCargo').innerText = emp.cargo || '-';
    document.getElementById('resumeAdmissao').innerText = toDateBR(emp.admissionDate || emp.admissao);
    document.getElementById('resumeNascimento').innerText = toDateBR(emp.nascimento);
    document.getElementById('resumeStatus').innerText = ativoLabel;
    document.getElementById('dados').innerHTML = `<div class="ep-card"><div class="ep-grid"><div class="ep-field"><div class="ep-label">Nome</div><div class="ep-value">${esc(emp.nome || '-')}</div></div><div class="ep-field"><div class="ep-label">Email</div><div class="ep-value">${esc(emp.email || '-')}</div></div><div class="ep-field"><div class="ep-label">Cargo</div><div class="ep-value">${esc(emp.cargo || '-')}</div></div><div class="ep-field"><div class="ep-label">Admissão</div><div class="ep-value">${esc(toDateBR(emp.admissionDate || emp.admissao))}</div></div><div class="ep-field"><div class="ep-label">Nascimento</div><div class="ep-value">${esc(toDateBR(emp.nascimento))}</div></div><div class="ep-field"><div class="ep-label">Status</div><div class="ep-value">${esc(ativoLabel)}</div></div><div class="ep-field" style="grid-column:1 / -1;"><div class="ep-label">Observações</div><div class="ep-value">${esc(emp.observacoes || emp.observacoesCadastro || '-')}</div></div></div></div>`;
  }
  document.getElementById('avaliacoes').innerHTML = `<div class="ep-card"><div id="employeePerformanceList"><div class="ep-empty">Carregando avaliações...</div></div></div>`;
  await loadPerformanceReviews(uid, role, user);
</script>
</body>
</html>
