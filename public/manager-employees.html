<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    window.__DMULLER_API_BASE__ = window.__DMULLER_API_BASE__
      || (["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
        ? "http://127.0.0.1:8000"
        : "https://dmuller-feedback-platform-5.onrender.com");
  </script>
  <title>Funcionários • D’MULLER</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .me-page{max-width:1180px;margin:0 auto}.me-stack{display:flex;flex-direction:column;gap:12px}.me-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px;border:1px solid var(--dm-border);border-radius:var(--dm-r-xl);background:linear-gradient(180deg,#fff,#fbfcff);box-shadow:var(--dm-shadow)}.me-title{margin:0;font-size:18px;font-weight:950;color:var(--dm-text)}.me-sub{margin-top:6px;color:var(--dm-muted);font-size:13px;font-weight:800}.me-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.me-btn{padding:10px 12px;border-radius:var(--dm-r-md);border:1px solid rgba(16,24,40,.14);background:#fff;font-weight:950;cursor:pointer;text-decoration:none;color:var(--dm-text);display:inline-flex;align-items:center;gap:8px}.me-btn:hover{background:#f9fafb}.me-btn-cta{background:linear-gradient(180deg,rgba(245,197,24,.98),rgba(245,197,24,.88));border-color:rgba(245,197,24,.55);color:#111827}.me-btn-dark{background:linear-gradient(180deg,#111827,#0b1220);border-color:#0b1220;color:#fff}.me-btn-danger{background:linear-gradient(180deg,#b00020,#7a0015);border-color:#7a0015;color:#fff}.me-panel{border:1px solid var(--dm-border);border-radius:var(--dm-r-xl);background:#fff;box-shadow:var(--dm-shadow);overflow:hidden}.me-panelTop{padding:12px 14px;border-bottom:1px solid rgba(16,24,40,.08);display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.me-searchWrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex:1}.me-search{width:min(520px,100%);padding:11px 12px;border-radius:var(--dm-r-md);border:1px solid rgba(16,24,40,.14);font-weight:900;outline:none}.me-count{font-size:12px;font-weight:950;color:var(--dm-muted);white-space:nowrap}.me-list{display:flex;flex-direction:column;gap:10px;padding:12px 14px}.me-item{border:1px solid rgba(16,24,40,.12);border-radius:var(--dm-r-xl);background:#fff;padding:12px;box-shadow:0 10px 24px rgba(2,8,23,.06)}.me-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer}.me-left{min-width:260px}.me-name{font-weight:950;color:var(--dm-text)}.me-email{margin-top:4px;font-size:12px;color:#334155;word-break:break-word}.me-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}.me-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:950;border:1px solid rgba(16,24,40,.14);background:#f8fafc}.me-dot{width:8px;height:8px;border-radius:999px;background:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.18)}.me-pill.ok{background:#ecfdf5;border-color:#a7f3d0;color:#064e3b}.me-pill.ok .me-dot{background:#22c55e}.me-pill.off{background:#fff1f2;border-color:#fecaca;color:#9f1239}.me-pill.off .me-dot{background:#fb7185}.me-pill.role{background:#eef4ff;border-color:#cfe0ff;color:#1d4ed8}.me-details{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(2,8,23,.08)}.me-details.open{display:block}.me-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}@media(max-width:900px){.me-grid{grid-template-columns:1fr}}.me-field{background:#fff;border:1px solid rgba(16,24,40,.10);border-radius:12px;padding:10px}.me-label{font-size:11px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--dm-muted)}.me-value{margin-top:4px;font-weight:800;color:var(--dm-text)}.me-actionsRow{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.me-editArea{display:none;margin-top:10px;padding:10px;border-radius:14px;border:1px solid rgba(16,24,40,.12);background:#fbfcff}.me-editArea.open{display:block}.me-editGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.me-editGrid input,.me-editGrid select{width:100%;padding:10px;border-radius:12px;border:1px solid rgba(16,24,40,.14);font-weight:900;outline:none;background:#fff}@media(max-width:900px){.me-editGrid{grid-template-columns:1fr}}.me-banner{margin-top:12px;padding:12px 14px;border-radius:14px;border:1px solid rgba(16,24,40,.12);background:#fff;font-weight:950;color:var(--dm-muted)}.me-banner.bad{border-color:#fecaca;background:#fff1f2;color:#9f1239}.me-banner.ok{border-color:#a7f3d0;background:#ecfdf5;color:#064e3b}
  </style>
</head>
<body>
<script type="module">
  import { requireRole } from "/js/auth-guard.js";
  import { renderShell } from "/js/ui-shell.js";
  import { getActiveScope, loadScopedEmployees } from "/js/scope-utils.js";
  import { apiDelete, apiPatch, logBackendSuccess } from "/js/api-client.js";

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const toDateBR = (v) => { if(!v) return '-'; if(typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)){ const [y,m,d]=v.split('-'); return `${d}/${m}/${y}`; } try{ const d=v?.toDate?v.toDate():new Date(v); return isNaN(d.getTime())?'-':d.toLocaleDateString('pt-BR'); }catch{return '-';} };
  const toDateInput = (v) => { if(!v) return ''; if(typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)) return v; return ''; };

  const { user, role } = await requireRole(["manager", "admin", "coordinator"]);
  const content = await renderShell({ role, currentPage: "manager-employees" });
  const scope = getActiveScope(role, user, { allowAdminAll: false });
  if (!scope) {
    content.innerHTML = `<div class="me-page"><div class="me-stack"><div class="me-banner">Selecione um coordenador ou um gestor para visualizar os funcionários.</div></div></div>`;
  } else {
    let items = [];
    content.innerHTML = `<div class="me-page"><div class="me-stack"><div class="me-header"><div><h1 class="me-title">Funcionários</h1><div class="me-sub">Lista e gestão da equipe</div></div><div class="me-actions">${role !== 'coordinator' ? `<a class="me-btn me-btn-dark" href="/manager-create-employee.html">Criar Funcionário</a>` : ''}<button class="me-btn" id="btnReload">Recarregar</button></div></div><div class="me-panel"><div class="me-panelTop"><div class="me-searchWrap"><input id="search" class="me-search" placeholder="Buscar por nome ou e-mail..." /></div><div class="me-count" id="count">Carregando…</div></div><div class="me-list" id="list"></div><div style="padding:0 14px 14px" id="msg"></div></div></div></div>`;
    const listEl = document.getElementById('list'); const searchEl = document.getElementById('search'); const countEl = document.getElementById('count'); const btnReload = document.getElementById('btnReload'); const msgEl = document.getElementById('msg');
    const setMsg = (text, type='') => { if (!text) { msgEl.innerHTML=''; return; } msgEl.innerHTML = `<div class="me-banner ${type}">${esc(text)}</div>`; };

    async function loadEmployees(){ return loadScopedEmployees(role, user, { scope }); }

    function render(){
      const term = (searchEl.value || '').trim().toLowerCase();
      const filtered = items.filter(x => !term || (x.nome || '').toLowerCase().includes(term) || (x.email || '').toLowerCase().includes(term));
      countEl.textContent = `Total: ${items.length} • Mostrando: ${filtered.length}`;
      if (!filtered.length) { listEl.innerHTML = `<div style="color:#666;padding:6px 2px;font-weight:900">Nenhum funcionário encontrado.</div>`; return; }
      listEl.innerHTML = filtered.map(x => { const id=esc(x.id); const ativo=x.ativo !== false; return `<div class="me-item"><div class="me-head" data-toggle="${id}"><div class="me-left"><div class="me-name">${esc(x.nome || 'Sem nome')}</div><div class="me-email">${esc(x.email || '')}</div></div><div class="me-right"><span class="me-pill ${ativo?'ok':'off'}"><span class="me-dot"></span>${ativo?'Ativo':'Inativo'}</span><span class="me-pill role">Cargo: <b>${esc(x.cargo || '-')}</b></span></div></div><div class="me-details" id="det-${id}"><div class="me-grid"><div class="me-field"><div class="me-label">Cargo</div><div class="me-value">${esc(x.cargo || '-')}</div></div><div class="me-field"><div class="me-label">Admissão</div><div class="me-value">${esc(toDateBR(x.admissionDate || x.admissao))}</div></div><div class="me-field"><div class="me-label">Nascimento</div><div class="me-value">${esc(toDateBR(x.nascimento))}</div></div></div><div class="me-actionsRow"><a class="me-btn me-btn-dark" href="/employee-profile.html?uid=${encodeURIComponent(x.uid || x.id)}">Ver perfil</a>${role === 'admin' ? `<button class="me-btn" data-edit="${id}">Editar</button><button class="me-btn me-btn-danger" data-del="${id}">Excluir</button>` : ''}</div>${role === 'admin' ? `<div class="me-editArea" id="edit-${id}"><div class="me-editGrid"><div><div class="me-label" style="margin-bottom:6px">Nome</div><input data-inp="nome" value="${esc(x.nome || '')}" /></div><div><div class="me-label" style="margin-bottom:6px">Email</div><input data-inp="email" value="${esc(x.email || '')}" /></div><div><div class="me-label" style="margin-bottom:6px">Cargo</div><input data-inp="cargo" value="${esc(x.cargo || '')}" /></div><div><div class="me-label" style="margin-bottom:6px">Ativo</div><select data-inp="ativo"><option value="true" ${x.ativo !== false ? 'selected' : ''}>Ativo</option><option value="false" ${x.ativo === false ? 'selected' : ''}>Inativo</option></select></div><div><div class="me-label" style="margin-bottom:6px">Admissão</div><input data-inp="admissionDate" type="date" value="${esc(toDateInput(x.admissionDate || x.admissao))}" /></div><div><div class="me-label" style="margin-bottom:6px">Nascimento</div><input data-inp="nascimento" type="date" value="${esc(toDateInput(x.nascimento))}" /></div></div><div class="me-actionsRow"><button class="me-btn me-btn-cta" data-save="${id}">Salvar</button><button class="me-btn" data-cancel="${id}">Cancelar</button></div></div>` : ''}</div></div>`; }).join('');
      listEl.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', ()=> document.getElementById(`det-${el.dataset.toggle}`).classList.toggle('open')));
      if (role === 'admin') {
        listEl.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); document.getElementById(`edit-${btn.dataset.edit}`).classList.toggle('open'); }));
        listEl.querySelectorAll('[data-cancel]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); document.getElementById(`edit-${btn.dataset.cancel}`).classList.remove('open'); }));
        listEl.querySelectorAll('[data-save]').forEach(btn => btn.addEventListener('click', async e => { e.stopPropagation(); const id=btn.dataset.save; const edit=document.getElementById(`edit-${id}`); const nome=edit.querySelector('[data-inp="nome"]').value.trim(); const email=edit.querySelector('[data-inp="email"]').value.trim(); const cargo=edit.querySelector('[data-inp="cargo"]').value.trim(); const ativo=edit.querySelector('[data-inp="ativo"]').value === 'true'; const admissionDate=edit.querySelector('[data-inp="admissionDate"]').value; const nascimento=edit.querySelector('[data-inp="nascimento"]').value; if(!nome) return setMsg('Nome não pode ficar vazio.','bad'); try { await apiPatch(`/api/employees/${encodeURIComponent(id)}`, { nome,email,cargo,ativo,admissionDate:admissionDate || '',nascimento }); logBackendSuccess("atualização de funcionário", { employeeUid: id }); const idx=items.findIndex(x => x.id===id); if(idx>=0) items[idx]={...items[idx], nome,email,cargo,ativo,admissionDate,nascimento}; setMsg('Cadastro atualizado com sucesso.','ok'); render(); } catch { setMsg('Não foi possível salvar agora.','bad'); } }));
        listEl.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', async e => { e.stopPropagation(); const id=btn.dataset.del; const emp=items.find(x=>x.id===id); if(!confirm(`Excluir o funcionário "${emp?.nome || 'Sem nome'}"?`)) return; try { await apiDelete(`/api/employees/${encodeURIComponent(id)}`); logBackendSuccess("exclusão de funcionário", { employeeUid: id }); items=items.filter(x=>x.id!==id); setMsg('Funcionário excluído com sucesso.','ok'); render(); } catch { setMsg('Não foi possível excluir agora.','bad'); } }));
      }
    }
    async function boot(){ setMsg('Carregando funcionários...'); items = await loadEmployees(); setMsg(''); render(); }
    searchEl.addEventListener('input', render); btnReload?.addEventListener('click', boot); await boot();
  }
</script>
</body>
</html>
