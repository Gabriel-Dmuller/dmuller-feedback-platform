<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script>
    window.__DMULLER_API_BASE__ = window.__DMULLER_API_BASE__
      || (["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
        ? "http://127.0.0.1:8000"
        : "https://dmuller-feedback-platform-5.onrender.com");
  </script>
  <title>Avaliação de Desempenho</title>
  <style>
    :root{--bg:#f6f7f9;--card:#ffffff;--text:#111827;--muted:#64748b;--line:rgba(16,24,40,.12);--accent:#f5c518;--danger:#9f1239}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}header{padding:18px 22px;background:#fff;border-bottom:1px solid #dbe3ef}.head-wrap{max-width:1180px;margin:0 auto}.title{font-size:24px;font-weight:950}.subtitle{margin-top:4px;font-size:13px;color:var(--muted);font-weight:800}main{max-width:1180px;margin:0 auto;padding:22px}.stack{display:flex;flex-direction:column;gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 24px rgba(2,8,23,.06);padding:14px}.ctx-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}@media (max-width:900px){.ctx-grid{grid-template-columns:1fr 1fr}}@media (max-width:640px){.ctx-grid{grid-template-columns:1fr}}.ctx-item{border:1px solid rgba(16,24,40,.1);border-radius:12px;padding:10px;background:#fff}.ctx-label{font-size:11px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.ctx-value{margin-top:4px;font-size:14px;font-weight:900;color:var(--text);word-break:break-word}.section-title{margin:0 0 10px;font-size:16px;font-weight:950}.q{padding:12px;border:1px solid rgba(16,24,40,.1);border-radius:12px;margin:10px 0;background:#fff}.q-title{font-size:14px;font-weight:800;margin-bottom:10px}.opts{display:flex;gap:8px;flex-wrap:wrap}.opt{border:1px solid rgba(16,24,40,.16);padding:10px 12px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:900;background:#fff}.opt.active{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.12);color:#1e3a8a}textarea,input[type=date]{width:100%;min-height:44px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:800;resize:vertical;outline:none}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.footer{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.actions{display:flex;gap:10px}.btn{border-radius:12px;border:1px solid rgba(16,24,40,.14);padding:10px 14px;cursor:pointer;font-weight:950}.btn-primary{background:linear-gradient(180deg,rgba(245,197,24,.98),rgba(245,197,24,.88));border-color:rgba(245,197,24,.55);color:#111827}.btn-secondary{background:#fff;color:#111827}.msg{font-size:13px;font-weight:800}.bad{color:var(--danger)}
  </style>
</head>
<body>
  <header><div class="head-wrap"><div class="title">Avaliação de Desempenho</div><div class="subtitle">Preencha os critérios e finalize o envio.</div></div></header>
  <main><div class="stack"><div class="card"><div class="ctx-grid"><div class="ctx-item"><div class="ctx-label">Funcionário</div><div class="ctx-value" id="contextEmployee">-</div></div><div class="ctx-item"><div class="ctx-label">Tipo</div><div class="ctx-value" id="contextType">-</div></div><div class="ctx-item"><div class="ctx-label">Referência</div><div class="ctx-value" id="contextPeriod">-</div></div><div class="ctx-item"><div class="ctx-label">Prazo</div><div class="ctx-value" id="contextDue">-</div></div></div></div><div id="formRoot"></div><div class="card"><div class="footer"><div class="msg" id="msg"></div><div class="actions"><a class="btn btn-secondary" href="/manager-performance.html">Voltar</a><button id="btnSubmit" class="btn btn-primary" type="button">Enviar avaliação</button></div></div></div></div></main>
  <script type="module" src="/js/performanceReviewCreate.js"></script>
</body>
</html>
