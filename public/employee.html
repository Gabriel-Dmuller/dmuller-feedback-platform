<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script>
    window.__DMULLER_API_BASE__ = window.__DMULLER_API_BASE__
      || (["localhost", "127.0.0.1", "0.0.0.0"].includes(window.location.hostname)
        ? "http://127.0.0.1:8000"
        : "https://SEU-BACKEND-PRODUCAO");
  </script>
  <title>Minhas Avaliações • D'MULLER</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--line:#dbe3ef;--text:#0f172a;--muted:#64748b;--title:#0b1f44;--accent:#f4c400;--ok:#166534;--okbg:#dcfce7;--warn:#92400e;--warnbg:#fff7d6;--blue:#1d4ed8;--bluebg:#e8f1ff;--shadow:0 14px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top right, rgba(244,196,0,.10), transparent 24%),linear-gradient(180deg,#f8fbff 0%,#f2f5fa 100%);color:var(--text)}
    header{background:linear-gradient(135deg,#081226 0%,#0f254c 100%);color:#fff;padding:20px 0;border-bottom:4px solid var(--accent);box-shadow:0 10px 30px rgba(2,8,23,.18)}
    .wrap{max-width:1160px;margin:0 auto;padding:0 18px}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#dbe7ff}.eyebrow i{width:8px;height:8px;border-radius:999px;background:var(--accent);display:inline-block;box-shadow:0 0 0 6px rgba(244,196,0,.14)}.title{margin-top:10px;font-size:28px;font-weight:900;line-height:1.08}.sub{margin-top:8px;font-size:14px;color:#dbe7ff;font-weight:700}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid transparent;white-space:nowrap}.pill.info{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.18)}
    .btn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.10);color:#fff;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}
    main{max-width:1160px;margin:0 auto;padding:20px 18px 30px}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.stat{background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}.stat-k{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:900}.stat-v{margin-top:10px;font-size:24px;font-weight:900;color:var(--title)}
    .panel{background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-top:14px}.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}.panel-title{font-size:18px;font-weight:900;color:var(--title)}.panel-sub{font-size:13px;color:var(--muted);margin-top:5px;font-weight:700}.tabs{display:flex;gap:10px;flex-wrap:wrap}.tab{padding:10px 14px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(180deg,#0e2349 0%,#081226 100%);color:#fff;border-color:#0e2349}
    .list{display:flex;flex-direction:column;gap:12px}.item{border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%)}.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}.item-title{font-size:16px;font-weight:900;color:var(--title)}.item-sub{margin-top:5px;font-size:13px;color:var(--muted);font-weight:700}.item-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}.mini{border:1px solid #e5edf6;border-radius:14px;background:#fff;padding:12px}.mini-k{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:900}.mini-v{margin-top:7px;font-size:14px;font-weight:800;color:#0f172a}.actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}.action-link{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid #0f172a;text-decoration:none;font-weight:900;color:#0f172a;background:#fff}.action-link:hover{background:#f8fafc}.tag{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900}.tag.pending{background:var(--warnbg);color:var(--warn)}.tag.done{background:var(--okbg);color:var(--ok)}.tag.info{background:var(--bluebg);color:var(--blue)}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:18px;background:#fff;color:#475569;font-weight:700}
    @media(max-width:980px){.item-grid,.stats{grid-template-columns:repeat(2,minmax(0,1fr))}} @media(max-width:640px){.item-grid,.stats{grid-template-columns:1fr}.title{font-size:24px}}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="head">
        <div>
          <div class="eyebrow"><i></i> Plataforma de Avaliações</div>
          <div class="title">Minhas avaliações</div>
          <div class="sub" id="helloLine">Carregando...</div>
        </div>
        <div class="top-actions">
          <span class="pill info" id="userRight">-</span>
          <button class="btn" id="btnLogout">Sair</button>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="stat-k">Pendentes</div><div class="stat-v" id="countPending">0</div></div>
      <div class="stat"><div class="stat-k">Concluídas</div><div class="stat-v" id="countDone">0</div></div>
      <div class="stat"><div class="stat-k">No histórico</div><div class="stat-v" id="countAll">0</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Avaliações de desempenho</div><div class="panel-sub" id="panelSub">Acompanhe as avaliações do seu histórico.</div></div>
        <div class="tabs"><button class="tab active" data-tab="pending">Pendentes</button><button class="tab" data-tab="done">Concluídas</button></div>
      </div>
      <div class="list" id="list"></div>
    </div>
  </main>
  <script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { auth } from "/js/firebase.js";
    import { apiGet, logBackendSuccess } from "/js/api-client.js";
    import { taskTypeLabel } from "/js/review-core.js";

    const helloLine = document.getElementById("helloLine");
    const userRight = document.getElementById("userRight");
    const btnLogout = document.getElementById("btnLogout");
    const list = document.getElementById("list");
    const panelSub = document.getElementById("panelSub");
    const countPending = document.getElementById("countPending");
    const countDone = document.getElementById("countDone");
    const countAll = document.getElementById("countAll");
    let mode = "pending";
    let reviews = [];

    function esc(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function fmt(v){ try { const d = v?.toDate ? v.toDate() : new Date(v); return isNaN(d.getTime()) ? "-" : d.toLocaleString("pt-BR"); } catch { return "-"; } }
    function fmtDateOnly(v){ if (!v) return "-"; const s = String(v).trim(); if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; } return s; }
    function typeLabel(type){ return taskTypeLabel(type); }
    function statusOf(item){ return String(item.acknowledgment?.status || 'pending').toLowerCase() === 'done' || String(item.acknowledgment?.status || '').toLowerCase() === 'acknowledged' ? 'done' : 'pending'; }

    function render(){
      const filtered = reviews.filter(r => statusOf(r) === mode);
      countPending.textContent = String(reviews.filter(r => statusOf(r) === 'pending').length);
      countDone.textContent = String(reviews.filter(r => statusOf(r) === 'done').length);
      countAll.textContent = String(reviews.length);
      panelSub.textContent = mode === 'pending' ? 'Avaliações aguardando sua confirmação.' : 'Avaliações já confirmadas por você.';
      if (!filtered.length) { list.innerHTML = `<div class="empty">${mode === 'pending' ? 'Nenhuma avaliação pendente no momento.' : 'Nenhuma avaliação confirmada ainda.'}</div>`; return; }
      list.innerHTML = filtered.map(item => {
        const status = statusOf(item);
        return `<div class="item"><div class="item-top"><div><div class="item-title">${esc(typeLabel(item.taskType))}</div><div class="item-sub">Registrada em ${esc(fmt(item.submittedAt || item.createdAt))}</div></div><div><span class="tag ${status === 'done' ? 'done' : 'pending'}">${status === 'done' ? 'Confirmada' : 'Pendente'}</span></div></div><div class="item-grid"><div class="mini"><div class="mini-k">Gestor</div><div class="mini-v">${esc(item.evaluatorName || '-')}</div></div><div class="mini"><div class="mini-k">Referência</div><div class="mini-v">${esc(fmtDateOnly(item.referenceDate))}</div></div><div class="mini"><div class="mini-k">Prazo</div><div class="mini-v">${esc(fmtDateOnly(item.dueDate))}</div></div><div class="mini"><div class="mini-k">Resultado</div><div class="mini-v">${esc(item.score?.label || '-')}</div></div></div><div class="actions"><a class="action-link" href="/performance-review-view.html?id=${encodeURIComponent(item.id)}">Abrir avaliação</a></div></div>`;
      }).join('');
    }

    document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', ()=>{
      document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.tab;
      render();
    }));

    btnLogout.addEventListener('click', async ()=>{ await signOut(auth); window.location.href = '/index.html'; });

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/index.html'; return; }
      const me = await apiGet("/api/me");
      logBackendSuccess("perfil do funcionário", { uid: me.uid });
      const roleData = me.profile || {};
      const role = me.role || '';
      if (role !== 'employee') {
        window.location.href = '/manager-home.html';
        return;
      }
      helloLine.textContent = roleData?.nome ? `Olá, ${roleData.nome}` : `Olá, ${user.email}`;
      userRight.textContent = user.email || '-';

      const result = await apiGet("/api/reviews");
      logBackendSuccess("histórico do funcionário", { count: result?.reviews?.length || 0 });
      reviews = (result?.reviews || []).sort((a,b)=>String(b.submittedAt || b.createdAt || "").localeCompare(String(a.submittedAt || a.createdAt || "")));
      render();
    });
  </script>
</body>
</html>
